<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeWave Academy — Portal de Padres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a14;--bg2:#13131f;--bg3:#1b1b2c;
  --accent:#8b8ff8;--accent2:#6e72e8;--accent-soft:rgba(139,143,248,.14);
  --text:#ecedf6;--text2:#9a9bb6;--text3:#6c6d85;
  --border:rgba(139,143,248,.14);
  --green:#7ee0a8;--green-bg:rgba(126,224,168,.12);
  --blue:#7fb6f8;--blue-bg:rgba(127,182,248,.12);
  --purp:#b9a8ff;--purp-bg:rgba(185,168,255,.12);
  --amber:#f3c969;--amber-bg:rgba(243,201,105,.12);
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:0 16px 70px}

/* HERO */
.hero{position:relative;text-align:center;padding:46px 24px 38px;overflow:hidden;
  background:radial-gradient(130% 90% at 50% -20%, rgba(139,143,248,.40), rgba(110,114,232,.05) 55%, transparent 72%), var(--bg);}
.brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:26px}
.brand .ic{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1f7a5a,#2bb37e);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 18px rgba(43,179,126,.4)}
.brand span{font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;color:var(--accent);letter-spacing:-.01em}
.logo{width:118px;height:auto;display:block;margin:0 auto 22px;border-radius:18px;box-shadow:0 8px 30px rgba(43,179,126,.25)}
.hero h1{font-family:'Poppins',sans-serif;font-weight:800;font-size:30px;line-height:1.12;color:var(--accent);letter-spacing:-.02em;margin-bottom:12px}
.hero p{font-size:15px;color:var(--text2);max-width:420px;margin:0 auto;line-height:1.55}

/* SEARCH */
.searchbox{background:var(--bg2);border:1px solid var(--border);border-radius:18px;box-shadow:0 16px 50px rgba(0,0,0,.5);padding:20px;margin-top:8px;position:relative;z-index:2}
.searchbox label{font-size:13px;color:var(--text2);font-weight:500;display:block;margin-bottom:9px}
.srow{display:flex;gap:9px}
#q{flex:1;padding:14px 15px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border .15s,box-shadow .15s}
#q::placeholder{color:var(--text3)}
#q:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
#go{padding:14px 22px;background:var(--accent);color:#0a0a14;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 0 22px rgba(139,143,248,.35)}
#go:hover{background:#a0a3ff;box-shadow:0 0 30px rgba(139,143,248,.55)}
#go:disabled{opacity:.55;cursor:default;box-shadow:none}

/* RESULTS */
#out{margin-top:20px}
.hint{text-align:center;color:var(--text2);font-size:14px;padding:34px 10px;line-height:1.6}
.hint .big{font-size:38px;display:block;margin-bottom:10px}
.hint b{color:var(--text)}

.kid{background:var(--bg2);border:1px solid var(--border);border-radius:18px;box-shadow:0 10px 36px rgba(0,0,0,.4);overflow:hidden;margin-bottom:18px;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.kid-head{padding:20px 22px;background:linear-gradient(120deg,rgba(139,143,248,.10),transparent);border-bottom:1px solid var(--border)}
.kid-name{font-family:'Poppins',sans-serif;font-size:21px;font-weight:700;color:var(--accent);letter-spacing:-.01em}
.kid-sub{font-size:13px;color:var(--text2);margin-top:3px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:10px}
.b1{background:var(--green-bg);color:var(--green)}.b2{background:var(--blue-bg);color:var(--blue)}.b3{background:var(--purp-bg);color:var(--purp)}

.prog{padding:22px}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.prog-num{font-size:15px;color:var(--text2)}
.prog-num b{font-family:'Poppins',sans-serif;font-size:27px;color:var(--text);font-weight:700;margin-right:2px}
.prog-pct{font-size:13px;color:var(--accent);font-weight:600}
.bar{height:13px;background:var(--bg3);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:8px;transition:width .7s cubic-bezier(.16,1,.3,1);box-shadow:0 0 14px rgba(139,143,248,.5)}
.pend{margin-top:10px;font-size:13px;color:var(--text2)}
.pend b{color:var(--accent)}
.porconf{font-size:15px;color:var(--amber);background:var(--amber-bg);padding:12px 15px;border-radius:12px;font-weight:500}
.skills{padding:4px 22px 16px}
.skill{margin-bottom:14px}
.sl{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;color:var(--text)}
.sl .v{font-weight:600}
.sbar{height:10px;background:var(--bg3);border-radius:6px;overflow:hidden}
.sfill{height:100%;border-radius:6px;transition:width .7s cubic-bezier(.16,1,.3,1)}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
.pill{font-size:13px;padding:9px 13px;border-radius:10px}
.pill b{display:block;font-size:11px;opacity:.75;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.pdom{background:var(--green-bg);color:var(--green)}
.pmeta{background:var(--accent-soft);color:var(--purp)}

.sec-t{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:0 22px;margin:8px 0 8px}
.clist{padding:0 22px 8px}
.cl{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.cl:last-child{border-bottom:none}
.cl-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ic-done{background:var(--green-bg)}.ic-next{background:var(--blue-bg)}
.cl-d{font-size:14px;font-weight:500;text-transform:capitalize;color:var(--text)}
.cl-h{font-size:13px;color:var(--text2)}
.empty{padding:14px 22px 20px;color:var(--text3);font-size:13px;font-style:italic}
.divider{height:8px;background:var(--bg)}
.foot{text-align:center;color:var(--text3);font-size:12px;margin-top:28px;line-height:1.7}
</style>
</head>
<body>
<header class="hero">
  <img src="safewave_logo.png" alt="SafeWave Academy" class="logo" onerror="this.style.display='none';var f=document.getElementById('brandFb');if(f)f.style.display='inline-flex'">
  <div id="brandFb" class="brand" style="display:none"><span class="ic">🌊</span><span>SafeWave Academy</span></div>
  <h1>Portal de Padres</h1>
  <p>Consulta el progreso y las clases de tu hijo/a</p>
</header>

<div class="wrap">
  <div class="searchbox">
    <label for="q">Escribe el nombre de tu hijo/a</label>
    <div class="srow">
      <input id="q" type="text" placeholder="Ej: Mateo, Sofía, Lili…" autocomplete="off" enterkeyhint="search">
      <button id="go">Buscar</button>
    </div>
  </div>

  <div id="out">
    <div class="hint">
      <span class="big">👋</span>
      Escribe el nombre de tu hijo/a y presiona <b>Buscar</b><br>para ver su progreso y sus clases.
    </div>
  </div>

  <div class="foot">
    🔒 Solo verás la información de tu hijo/a.<br>
    SafeWave Academy · Miami-Dade, FL
  </div>
</div>

<script>
const SB_URL='https://yfcvvtvvoqndwazprnul.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmY3Z2dHZ2b3FuZHdhenBybnVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNzM5OTEsImV4cCI6MjA5NzY0OTk5MX0.53eNjNrhTVnw_UXnVLB2Ol7MtH5pIgp35eZtmYfrqs4';
const sb=supabase.createClient(SB_URL,SB_ANON);

const DIAS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function hoyISO(){return new Date().toISOString().split('T')[0];}
function fmtFecha(f){const d=new Date(f+'T00:00:00');return DIAS[d.getDay()]+' '+d.getDate()+' '+MES[d.getMonth()];}
function fmtHora(h){if(!h)return'';const[H,M]=h.split(':');const n=+H;return((n%12)||12)+':'+M+(n>=12?'pm':'am');}
function nivClass(n){if(!n)return'b1';if(n.includes('2'))return'b2';if(n.includes('3'))return'b3';return'b1';}

const out=document.getElementById('out');
const inp=document.getElementById('q');
const btn=document.getElementById('go');

async function buscar(){
  const q=inp.value.trim();
  if(!q){inp.focus();return;}
  btn.disabled=true;btn.textContent='Buscando…';
  out.innerHTML='<div class="hint"><span class="big">⏳</span>Buscando…</div>';
  try{
    const r=await sb.from('alumnos_publico').select('*').order('nom');
    if(r.error)throw r.error;
    const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
    const nq=norm(q);
    const kids=(r.data||[]).filter(k=>norm(k.nom).includes(nq));
    if(kids.length===0){
      out.innerHTML='<div class="hint"><span class="big">🔍</span>No encontramos a <b>'+escapeHtml(q)+'</b>.<br>Revisa que el nombre esté bien escrito.</div>';
      return;
    }
    let html='';
    for(const k of kids){ html+=await tarjeta(k); }
    out.innerHTML=html;
    requestAnimationFrame(()=>document.querySelectorAll('.bar-fill,.sfill').forEach(b=>b.style.width=b.dataset.w+'%'));
  }catch(e){
    out.innerHTML='<div class="hint"><span class="big">⚠️</span>Hubo un problema al consultar.<br>Intenta de nuevo en un momento.</div>';
  }finally{
    btn.disabled=false;btn.textContent='Buscar';
  }
}

async function tarjeta(k){
  const cl=await sb.from('agenda_publico').select('*').eq('nin',k.nom).order('fec');
  let clases=(cl.data||[]).filter(c=>c.est!=='Cancelada');
  // Si el niño renovó, mostrar solo las clases del paquete actual (desde la renovación)
  if(k.reno && /^\d{4}-\d{2}-\d{2}$/.test(k.reno)){ clases=clases.filter(c=>c.fec>=k.reno); }
  const hoy=hoyISO();
  const hechas=clases.filter(c=>c.est==='Completada').sort((a,b)=>b.fec.localeCompare(a.fec));
  const prox=clases.filter(c=>c.est!=='Completada'&&c.fec>=hoy).sort((a,b)=>a.fec.localeCompare(b.fec));

  const total=parseInt(k.paq)||0;
  const done=k.us||0;
  const pct=total>0?Math.min(100,Math.round(done/total*100)):0;
  const faltan=total>0?Math.max(0,total-done):0;

  let progHtml;
  if(total>0){
    progHtml=
      '<div class="prog-top"><div class="prog-num"><b>'+done+'</b>de '+total+' clases</div>'+
      '<div class="prog-pct">'+pct+'%</div></div>'+
      '<div class="bar"><div class="bar-fill" data-w="'+pct+'" style="width:0%"></div></div>'+
      '<div class="pend">'+(faltan>0?('Le quedan <b>'+faltan+'</b> clase'+(faltan>1?'s':'')+' por tomar.'):'¡Completó todas sus clases! 🎉')+'</div>';
  }else{
    progHtml='<div class="porconf">📦 Paquete por confirmar'+(done>0?(' · ya tomó '+done+' clase'+(done>1?'s':'')):'')+'</div>';
  }

  const histHtml = hechas.length
    ? '<div class="clist">'+hechas.map(c=>fila(c,'done')).join('')+'</div>'
    : '<div class="empty">Aún no tiene clases completadas registradas.</div>';
  const proxHtml = prox.length
    ? '<div class="clist">'+prox.map(c=>fila(c,'next')).join('')+'</div>'
    : '<div class="empty">No tiene próximas clases agendadas.</div>';

  const skillsHtml = await skillsSection(k);

  return '<div class="kid">'+
    '<div class="kid-head">'+
      '<div class="kid-name">'+escapeHtml(k.nom)+'</div>'+
      '<div class="kid-sub">'+(k.edad?escapeHtml(k.edad):'')+'</div>'+
      (k.niv?'<span class="badge '+nivClass(k.niv)+'">'+escapeHtml(k.niv)+'</span>':'')+
    '</div>'+
    '<div class="prog">'+progHtml+'</div>'+
    skillsHtml+
    '<div class="sec-t">📅 Próximas clases</div>'+proxHtml+
    '<div class="divider"></div>'+
    '<div class="sec-t">✅ Clases completadas ('+hechas.length+')</div>'+histHtml+
  '</div>';
}

async function skillsSection(k){
  const pr=await sb.from('progreso_publico').select('*').eq('cid',k.id).limit(1);
  const p=(pr.data&&pr.data[0])||null;
  if(!p) return '';
  const skills=[
    ['Flotación',p.flo,'#1d9e75','#7ee0a8'],
    ['Respiración',p.resp,'#378add','#7fb6f8'],
    ['Patada',p.pat,'#7f77dd','#b9a8ff'],
    ['Confianza',p.conf,'#ba7517','#f3c969'],
    ['Resistencia',p.rsi,'#d4537e','#f4a3bf']
  ];
  const hasData = skills.some(s=>(+s[1]||0)>0) || (p.dom&&p.dom.trim()) || (p.met&&p.met.trim());
  if(!hasData) return '';
  const bars=skills.map(function(s){
    const v=Math.max(0,Math.min(100,+s[1]||0));
    return '<div class="skill"><div class="sl"><span>'+s[0]+'</span><span class="v" style="color:'+s[3]+'">'+v+'</span></div>'+
      '<div class="sbar"><div class="sfill" data-w="'+v+'" style="width:0%;background:'+s[2]+'"></div></div></div>';
  }).join('');
  let pills='';
  if(p.dom&&p.dom.trim()) pills+='<div class="pill pdom"><b>Ya domina</b>'+escapeHtml(p.dom)+'</div>';
  if(p.met&&p.met.trim()) pills+='<div class="pill pmeta"><b>Meta actual</b>'+escapeHtml(p.met)+'</div>';
  const nombre=escapeHtml(k.nom.split(' ')[0]);
  return '<div class="divider"></div><div class="sec-t">🏊 Cómo va '+nombre+'</div>'+
    '<div class="skills">'+bars+(pills?'<div class="pills">'+pills+'</div>':'')+'</div>';
}

function fila(c,tipo){
  const ic=tipo==='done'?'<div class="cl-ic ic-done">✓</div>':'<div class="cl-ic ic-next">🏊</div>';
  return '<div class="cl">'+ic+
    '<div><div class="cl-d">'+fmtFecha(c.fec)+'</div>'+
    '<div class="cl-h">'+fmtHora(c.hora)+(c.not?' · '+escapeHtml(c.not):'')+'</div></div></div>';
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

btn.addEventListener('click',buscar);
inp.addEventListener('keydown',e=>{if(e.key==='Enter')buscar();});
inp.focus();
</script>
</body>
</html>
